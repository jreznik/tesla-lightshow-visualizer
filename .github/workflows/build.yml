name: Build Multiplatform

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-linux:
    name: Build Flatpak (Linux)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download and Extract Raw Assets
        shell: bash
        run: |
          mkdir -p assets
          curl -L -o assets.zip "https://github.com/teslamotors/light-show/blob/master/xlights/tesla_xlights_show_folder.zip?raw=true"
          unzip -j assets.zip "tesla_xlights_show_folder/Model_S/ModelS.obj" -d assets/
          unzip -j assets.zip "tesla_xlights_show_folder/Model_S/ModelS.mtl" -d assets/
          unzip -j assets.zip "tesla_xlights_show_folder/Cybertruck/Cybertruck.obj" -d assets/
          unzip -j assets.zip "tesla_xlights_show_folder/Cybertruck/Cybertruck.mtl" -d assets/
          rm assets.zip

      - name: Build Flatpak
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: TeslaLightshowVisualizer.flatpak
          manifest: org.jreznik.TeslaLightshowVisualizer.yaml
          cache: true
          branch: main

      - name: Upload Flatpak Bundle
        uses: actions/upload-artifact@v4
        with:
          name: TeslaVisualizer-Flatpak
          path: TeslaLightshowVisualizer.flatpak

  build-desktop:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, windows-latest]
        include:
          - os: macos-latest
            qt_arch: clang_64
          - os: windows-latest
            qt_arch: win64_msvc2022_64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.2'
          arch: ${{ matrix.qt_arch }}
          modules: 'qtmultimedia qtquick3d qtshadertools'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Download and Extract Raw Assets
        shell: bash
        run: |
          mkdir -p assets
          curl -L -o assets.zip "https://github.com/teslamotors/light-show/blob/master/xlights/tesla_xlights_show_folder.zip?raw=true"
          unzip -j assets.zip "tesla_xlights_show_folder/Model_S/ModelS.obj" -d assets/
          unzip -j assets.zip "tesla_xlights_show_folder/Model_S/ModelS.mtl" -d assets/
          unzip -j assets.zip "tesla_xlights_show_folder/Cybertruck/Cybertruck.obj" -d assets/
          unzip -j assets.zip "tesla_xlights_show_folder/Cybertruck/Cybertruck.mtl" -d assets/
          rm assets.zip

      - name: Patch Models
        run: |
          python3 tools/patch_obj.py
          python3 tools/patch_ct.py

      - name: Convert to Meshes (Balsam)
        shell: bash
        run: |
          mkdir -p qml/cars/ModelS/meshes qml/cars/Cybertruck/meshes
          balsam -o qml/cars/ModelS assets/ModelS_patched.obj
          balsam -o qml/cars/Cybertruck assets/Cybertruck_patched.obj
          cp qml/cars/ModelS/meshes/*.mesh qml/cars/ModelS/meshes/ || true
          cp qml/cars/Cybertruck/meshes/*.mesh qml/cars/Cybertruck/meshes/ || true

      - name: Build (Windows)
        if: matrix.os == 'windows-latest'
        shell: cmd
        run: |
          mkdir build
          cd build
          qmake ..
          nmake

      - name: Build (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          mkdir build
          cd build
          qmake6 ..
          make -j$(sysctl -n hw.ncpu)

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: TeslaVisualizer-${{ matrix.os }}
          path: |
            build/tesla-lightshow-visualizer
            build/tesla-lightshow-visualizer.exe
            build/tesla-lightshow-visualizer.app
