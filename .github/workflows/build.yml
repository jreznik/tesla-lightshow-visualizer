name: Build Multiplatform

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-linux:
    name: Build Flatpak (Linux)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder

      - name: Configure Flatpak User Environment
        run: |
          # Setup a local user-mode flatpak environment to avoid permission issues
          flatpak remote-add --user --if-not-exists flathub https://dl.flathub.org/repo/flathub.flatpakrepo
          flatpak install --user -y flathub org.kde.Sdk//6.9 org.kde.Platform//6.9

      - name: Build Flatpak
        run: |
          # Use flatpak-builder directly with --user to ensure it uses the locally installed SDK
          flatpak-builder --user --install-deps-from=flathub --force-clean --repo=repo build-dir org.jreznik.TeslaLightshowVisualizer.yaml
          flatpak build-bundle repo TeslaLightshowVisualizer.flatpak org.jreznik.TeslaLightshowVisualizer

      - name: Upload Flatpak Bundle
        uses: actions/upload-artifact@v4
        with:
          name: TeslaVisualizer-Flatpak
          path: TeslaLightshowVisualizer.flatpak

  build-desktop:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, windows-latest]
        include:
          - os: macos-latest
            qt_arch: clang_64
          - os: windows-latest
            qt_arch: win64_msvc2022_64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.3'
          arch: ${{ matrix.qt_arch }}
          modules: 'qtmultimedia qtquick3d qtshadertools'

      - name: Set up MSVC environment
        if: matrix.os == 'windows-latest'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Build (Windows)
        if: matrix.os == 'windows-latest'
        shell: cmd
        run: |
          mkdir build
          cd build
          qmake ..
          nmake

      - name: Build (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          mkdir build
          cd build
          qmake6 ..
          make -j$(sysctl -n hw.ncpu)

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: TeslaVisualizer-${{ matrix.os }}
          path: |
            build/tesla-lightshow-visualizer
            build/tesla-lightshow-visualizer.exe
            build/tesla-lightshow-visualizer.app
