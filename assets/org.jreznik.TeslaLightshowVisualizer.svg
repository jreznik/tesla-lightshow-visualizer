<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="grad1" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" style="stop-color:#ff0000;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#880000;stop-opacity:1" />
        </linearGradient>
        <radialGradient id="glow" cx="50%" cy="50%" r="50%">
            <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.8" />
            <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0" />
        </radialGradient>
    </defs>
    <!-- Background Circle -->
    <circle cx="256" cy="256" r="240" fill="#1a1a1a" stroke="#ffffff" stroke-width="8"/>
    
    <!-- Stylized Model S Front -->
    <path d="M120 320 Q256 280 392 320 L400 360 Q256 380 112 360 Z" fill="url(#grad1)" />
    <path d="M150 325 L120 335 L125 350 Z" fill="#ffffff" opacity="0.9" /> <!-- Left Headlight -->
    <path d="M362 325 L392 335 L387 350 Z" fill="#ffffff" opacity="0.9" /> <!-- Right Headlight -->
    
    <!-- Light Rays -->
    <path d="M120 335 L20 280 L20 390 Z" fill="url(#glow)" opacity="0.4" />
    <path d="M392 335 L492 280 L492 390 Z" fill="url(#glow)" opacity="0.4" />
    
    <!-- Tesla T-Logo Stylized -->
    <path d="M256 310 L240 290 Q256 285 272 290 Z" fill="#ffffff" />
    
    <!-- Title Text -->
    <text x="256" y="460" font-family="Arial" font-size="40" fill="white" font-weight="bold" text-anchor="middle">LIGHTSHOW</text>
</svg>
