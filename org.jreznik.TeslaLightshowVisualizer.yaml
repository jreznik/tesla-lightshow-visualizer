app-id: org.jreznik.TeslaLightshowVisualizer
runtime: org.kde.Platform
runtime-version: '6.8'
sdk: org.kde.Sdk
command: tesla-lightshow-visualizer
finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --socket=pulseaudio
  - --share=network
  - --filesystem=home # Needed to load .fseq and .mp3 files from user home
modules:
  - name: tesla-lightshow-visualizer
    buildsystem: simple
    build-commands:
      - qmake6 PREFIX=/app
      - make -j$FLATPAK_BUILDER_NPROC
      - make install INSTALL_ROOT=/
    sources:
      - type: dir
        path: .
