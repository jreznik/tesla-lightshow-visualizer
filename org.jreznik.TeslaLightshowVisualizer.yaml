app-id: org.jreznik.TeslaLightshowVisualizer
runtime: org.kde.Platform
runtime-version: '6.8'
sdk: org.kde.Sdk
command: tesla-lightshow-visualizer
finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --socket=pulseaudio
  - --share=network
  - --filesystem=home
modules:
  - name: tesla-lightshow-visualizer
    buildsystem: simple
    build-commands:
      # Pre-build: Patch and convert models
      - python3 tools/patch_obj.py
      - python3 tools/patch_ct.py
      # Balsam creates a 'meshes' subfolder. We convert to a local dir and move.
      - mkdir -p balsam_ms balsam_ct
      - balsam -platform offscreen -o balsam_ms assets/ModelS_patched.obj
      - balsam -platform offscreen -o balsam_ct assets/Cybertruck_patched.obj
      - find balsam_ms -name "*.mesh" -exec cp -f {} qml/cars/ModelS/meshes/ \;
      - find balsam_ct -name "*.mesh" -exec cp -f {} qml/cars/Cybertruck/meshes/ \;
      
      - /usr/bin/qmake6 PREFIX=/app
      - make -j$FLATPAK_BUILDER_NPROC
      - make install INSTALL_ROOT=/
    sources:
      - type: dir
        path: .
