app-id: org.jreznik.TeslaLightshowVisualizer
runtime: org.kde.Platform
runtime-version: '6.8'
sdk: org.kde.Sdk
command: tesla-lightshow-visualizer
finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --socket=pulseaudio
  - --share=network
  - --filesystem=home
modules:
  - name: tesla-lightshow-visualizer
    buildsystem: simple
    build-commands:
      # Pre-build: Patch and convert models
      - python3 tools/patch_obj.py
      - python3 tools/patch_ct.py
      - balsam -o qml/cars/ModelS assets/ModelS_patched.obj
      - balsam -o qml/cars/Cybertruck assets/Cybertruck_patched.obj
      # Ensure meshes are in the correct place (Balsam nested folder fix)
      - cp qml/cars/ModelS/meshes/*.mesh qml/cars/ModelS/meshes/ || true
      - cp qml/cars/Cybertruck/meshes/*.mesh qml/cars/Cybertruck/meshes/ || true
      
      - make clean || true
      - /usr/bin/qmake6 PREFIX=/app
      - make -j$FLATPAK_BUILDER_NPROC
      - make install INSTALL_ROOT=/
    sources:
      - type: dir
        path: .
