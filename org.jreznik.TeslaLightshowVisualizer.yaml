app-id: org.jreznik.TeslaLightshowVisualizer
runtime: org.kde.Platform
runtime-version: '6.9'
sdk: org.kde.Sdk
command: tesla-lightshow-visualizer
finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --socket=pulseaudio
  - --share=network
  - --filesystem=home
modules:
  - name: tesla-lightshow-visualizer
    buildsystem: cmake-ninja
    sources:
      - type: dir
        path: .
